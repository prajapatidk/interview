<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="demo"></div>
    <script>
      //The JavaScript push() method is used to add one or more elements to the end of an array.

      // Adds element(s) at the end of array.
      // Changes the original array.
      // Returns the new length of array.

      const arr = [1, 2];

      arr.push(3, 4, 5);

      document.getElementById("demo").innerHTML = arr;
    </script>
  </body>
</html>
