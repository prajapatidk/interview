<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="demo"></div>
    <script>
      // The JavaScript unshift() method is used to add one or more elements to the beginning of an array.

      // Adds element(s) at the beginning of array.
      // Changes the original array.
      // Returns the new length of array.

      const arr = [20, 30, 40];

      arr.unshift(10);

      document.getElementById("demo").innerHTML = arr;
    </script>
  </body>
</html>
