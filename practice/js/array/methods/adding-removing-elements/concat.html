<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // The concat() method in JavaScript is used to combine two or more arrays and returns a new array without changing the original arrays.

      // It also works with strings.
      // No, concat() does not work with objects directly.
      const arr = [1, 2, 3];
      const arr2 = [4, 5, 6];
      const result = arr.concat(arr2);
      console.log(result);
    </script>
  </body>
</html>
