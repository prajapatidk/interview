<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // The slice() method is used to extract a portion of an array and return it as a new array without changing the original array.

      // array.slice(start, end)

      //✅ Returns a new array
      //✅ Does NOT modify original array
      //✅ End index is NOT included
      //✅ Supports negative indexes

      const arr = [10, 20, 30, 40, 50];

      console.log(arr.slice(1, 4)); // 20, 30, 40,
      console.log(arr.slice(1)); // 20, 30, 40, 50
      console.log(arr.slice(-2)); // 20, 30, 40, 50
    </script>
  </body>
</html>
