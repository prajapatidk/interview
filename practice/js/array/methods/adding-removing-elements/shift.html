<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="demo"></div>
    <script>
      // The JavaScript shift() method is used to remove the first element from an array and returns the removed element.

      // Removes element from the beginning of array.
      // Changes the original array.
      // Returns the removed element.

      const arr = [10, 20, 30, 40];

      const removedValue = arr.shift();

      console.log(removedValue);
      console.log(arr);
    </script>
  </body>
</html>
