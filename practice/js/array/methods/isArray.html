<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // The JavaScript Array.isArray() method is used to check whether a value is an array or not.

      // Returns true if value is an array.
      // Returns false for objects, strings, numbers, etc.

      const arr = [1, 2, 3];
      console.log(Array.isArray(arr)); // true

      const name = "Deepak";
      console.log(Array.isArray(name)); // false
    </script>
  </body>
</html>
