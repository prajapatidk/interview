<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // delete is an operator used to remove an element/property from an array or object, but in arrays it leaves an empty slot and does not change the array length.
      
      const arr = [1, 2, 3, 4, 5, 6];
      delete arr[2];

      console.log(arr);
      //[1, 2, empty, 4, 5, 6]
    </script>
  </body>
</html>
