      // Two way
      const addTwo = (num, target) => {
        let mp = new Map();
        for (let i = 0; i < num.length; i++) {
          let rem = target - num[i];
          if (mp.has(rem)) {
            return [mp.get(rem), i];
          } else {
            mp.set(num[i], i);
          }
        }
      };
      console.log(addTwo(nums, 20));
