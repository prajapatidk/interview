  <body>
    <script>
      // Find Large value of two index
      const data = [11, 22, 53, 66, 88, 54, 72, 46, 33, 55, 78];
      const getLargeValueOfTwoIndex = (arr, IndexCnt) => {
        let result = 0;
        const sortedArr = arr.sort((a, b) => a - b);
        for (let i = 0; i < IndexCnt; i++) {
          result += Math.max(...sortedArr);
          sortedArr.pop();
        }
        return result;
      };
      console.log(getLargeValueOfTwoIndex(data, 2));
    </script>
  </body>
