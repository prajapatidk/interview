<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <script>
      const data = [1, 2, 4, 5, 7, 8];

      const findIndexCombinationOfTargetValue = (arr, target) => {
        const result = [];
        for (let i = 0; i < arr.length; i++) {
          for (let j = i + 1; j < data.length; j++) {
            const add = arr[i] + arr[j];
            if (add === target) {
              result.push([i, j]);
            }
          }
        }
        return result;
      };
      console.log(findIndexCombinationOfTargetValue(data, 9));
    </script>
  </body>
</html>
