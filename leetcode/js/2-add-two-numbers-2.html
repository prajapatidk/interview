<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const l1 = [2, 4, 9, 3];
      const l2 = [5, 6, 10, 7];
      let addTwoNumbers = function (l1, l2) {
        let result = [];
        let carry = 0;
        const maxLength = Math.max(l1.length, l2.length);
        for (let i = 0; i < maxLength; i++) {
          const num1 = l1[i] ?? 0;
          const num2 = l2[i] ?? 0;
          const add = num1 + num2 + carry;
          const sum = i === maxLength - 1 ? add : Math.floor(add % 10);
          carry = 0;
          result.push(sum);
          carry = Math.floor(add / 10);
        }
        return result.reverse().join("");
      };

      console.log(addTwoNumbers(l1, l2));
    </script>
  </body>
</html>
