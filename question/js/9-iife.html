<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // An IIFE (Immediately Invoked Function Expression) is a function expression that executes immediately after it is created, primarily used to create a private scope and prevent variables and functions from polluting the global namespace.

      (() => {
        console.log("Immediately invoke function expression");
      })();
    </script>
  </body>
</html>
