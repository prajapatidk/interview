<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // Function declaration is way of defining a named function using the function keyword as a standalone statement. Function declarations are hoisted, Which means they can be called before their definition apprears in the code.

      function greet(name) {
        return `Hello, ${name}`;
      }

      //Function Expression is a function that is created and assigned to a variable, object property, or passed as an assignment. The function can be anonymous or named, and it is available only after the assignment is executed.

      const greet = function (name) {
        return `Hello, ${name}`;
      };
    </script>
  </body>
</html>
