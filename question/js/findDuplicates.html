<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <script>
      const data = [1, 2, 3, 2, 5, 3, 67, 8];

      const checkDuplicates = (items) => {
        let obj = {};
        for (const item of items) {
          if (obj[item]) {
            obj[item] += 1;
          } else {
            obj[item] = 1;
          }
        }
        let result = [];
        for (const [key, value] of Object.entries(obj)) {
          if (value > 1) {
            result.push(key);
          }
        }
        return result.join(",");
      };

      console.log(checkDuplicates(data));
    </script>
  </body>
</html>
