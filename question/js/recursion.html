  <body>
    <script>
      // In javascript recursion is a programming technique where function calls itself repeatedly until a stopping condition or base case meet.

      function recursion(n) {
        if (n == 0) {
          return;
        }
        console.log(n);
        recursion(n - 1);
      }

      recursion(4);
    </script>
  </body>
