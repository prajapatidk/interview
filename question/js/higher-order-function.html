<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
        // A function take a function as argument and return a value called higher order fuction

      const data = [10, 20, 30, 40];

      function square(item) {
        return item * 2;
      }

      function addOne(item) {
        return item + 1;
      }

      function calculator(items, callback) {
        const result = [];
        for (item of items) {
          result.push(callback(item));
        }
        return result;
      }

      console.log(calculator(data, square));
      console.log(calculator(data, addOne));
      console.log(data.map(addOne));
    </script>
  </body>
</html>
